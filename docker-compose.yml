version: '3'

services:
  app:
    build:
      context: ./emomap
      dockerfile: Dockerfile
    volumes:
      - ./emomap:/app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5432:5432"
